<style>
/* ── EduAI-Shield — Clean White/Green Theme ── */
:root{
  --green:#22c55e;--green-dark:#16a34a;--green-light:#f0fdf4;--green-mid:#dcfce7;--green-border:#bbf7d0;
  --red:#ef4444;--red-light:#fef2f2;--red-border:#fecaca;
  --amber:#f59e0b;--amber-light:#fffbeb;
  --text:#111827;--text-2:#6b7280;--text-3:#9ca3af;
  --bg:#f9fafb;--surface:#ffffff;--border:#e5e7eb;--border-2:#f3f4f6;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.05);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;--radius-xl:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:24px;background:linear-gradient(160deg,#f0fdf4 0%,#f9fafb 50%,#f0fdf4 100%)}
.login-logo{display:flex;align-items:center;gap:12px;font-size:24px;font-weight:700;color:var(--text)}
.login-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 14px rgba(34,197,94,.3)}
.login-tagline{font-size:14px;color:var(--text-2);text-align:center;max-width:320px;line-height:1.6}
.login-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.login-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:28px 32px;cursor:pointer;text-align:center;transition:all .2s;width:170px;box-shadow:var(--shadow)}
.login-card:hover{border-color:var(--green);transform:translateY(-4px);box-shadow:0 12px 32px rgba(34,197,94,.15)}
.login-card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px;background:var(--green-light);border:1px solid var(--green-border)}
.login-card-title{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text)}
.login-card-sub{font-size:11px;color:var(--text-2);line-height:1.4}
.auth-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:32px;width:100%;max-width:380px;box-shadow:var(--shadow-md)}
.auth-title{font-size:20px;font-weight:700;margin-bottom:6px;color:var(--text)}
.auth-sub{font-size:13px;color:var(--text-2);margin-bottom:24px;line-height:1.5}
.auth-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;transition:.2s}
.auth-input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.auth-error{color:var(--red);font-size:12px;margin-bottom:12px;background:var(--red-light);padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--red-border)}
.auth-back{background:none;border:none;color:var(--text-2);font-size:13px;cursor:pointer;margin-top:16px;font-family:'DM Sans',sans-serif;display:block;transition:.15s}
.auth-back:hover{color:var(--green)}

/* APP SHELL */
.app{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--text)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(34,197,94,.25)}
.main{flex:1;padding:28px;overflow-y:auto;max-width:1200px;width:100%;margin:0 auto}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;letter-spacing:-.1px}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.25)}.btn-primary:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.3)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626;transform:translateY(-1px)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:var(--green-dark)}
.btn-outline{background:var(--surface);border:1.5px solid var(--border);color:var(--text-2);font-weight:500}.btn-outline:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--radius-sm)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.section-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px}

/* TABS */
.tab-bar{display:flex;gap:2px;background:var(--border-2);border-radius:var(--radius-sm);padding:3px;margin-bottom:24px;flex-wrap:wrap;width:fit-content}
.tab-btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .2s;background:transparent;color:var(--text-2)}
.tab-btn.active{background:var(--surface);color:var(--green);font-weight:600;box-shadow:var(--shadow)}
.tab-btn:hover:not(.active){color:var(--text)}

/* TOGGLES */
.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#d1d5db;border-radius:22px;cursor:pointer;transition:.2s}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
input:checked+.slider{background:var(--green)}
input:checked+.slider:before{transform:translateX(16px)}

/* STUDENT CARDS */
.student-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:all .25s;box-shadow:var(--shadow)}
.student-card:hover{box-shadow:var(--shadow-md);border-color:#d1d5db}
.student-card.help{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,68,68,.15),var(--shadow-md);animation:helpFlash 1.2s ease-in-out infinite alternate}
@keyframes helpFlash{0%{box-shadow:0 0 0 2px rgba(239,68,68,.1),var(--shadow)}100%{box-shadow:0 0 0 3px rgba(239,68,68,.25),0 8px 24px rgba(239,68,68,.12)}}
.student-name{font-weight:600;font-size:14px;margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--text)}
.student-status{font-size:11px;color:var(--text-3);margin-bottom:14px;font-weight:500}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border-2)}
.toggle-row:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.toggle-label{font-size:12px;color:var(--text-2);font-weight:500}
.toggle-row-big{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-2)}
.toggle-row-big:last-child{border-bottom:none}
.toggle-desc{font-size:13px;font-weight:600;color:var(--text)}
.toggle-sub{font-size:11px;color:var(--text-3);margin-top:2px}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.02em}
.badge-red{background:#fef2f2;color:var(--red);border:1px solid #fecaca;animation:bounce .6s ease infinite alternate}
.badge-yellow{background:var(--amber-light);color:#92400e;border:1px solid #fde68a}
.badge-green{background:var(--green-light);color:var(--green-dark);border:1px solid var(--green-border)}
@keyframes bounce{0%{transform:scale(1)}100%{transform:scale(1.05)}}

/* ALERTS */
.alert-strip{background:var(--red-light);border:1px solid var(--red-border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#b91c1c;font-weight:500}

/* GLOBAL TOGGLES */
.global-toggles{background:var(--surface);border:1.5px solid var(--green-border);border-radius:var(--radius-lg);padding:22px;margin-bottom:24px;box-shadow:0 2px 12px rgba(34,197,94,.08)}
.global-label{font-size:11px;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}

/* LAYOUT */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.student-list-row{display:flex;align-items:center;padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:8px;gap:12px;border:1px solid var(--border-2);transition:.15s}
.student-list-row:hover{background:var(--green-light);border-color:var(--green-border)}
.disabled-notice{background:var(--border-2);border:1.5px dashed #d1d5db;border-radius:var(--radius-sm);padding:24px;text-align:center;color:var(--text-3);font-size:13px}

/* EXAM / PIN */
.exam-overlay{position:fixed;inset:0;background:rgba(17,24,39,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;backdrop-filter:blur(4px)}
.pin-overlay{position:fixed;inset:0;background:rgba(17,24,39,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px;width:340px;text-align:center;box-shadow:var(--shadow-lg)}
.pin-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;font-size:20px;font-family:'DM Mono',monospace;color:var(--text);text-align:center;letter-spacing:.3em;margin-bottom:16px;outline:none;transition:.2s}
.pin-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.pin-error{color:var(--red);font-size:12px;margin-bottom:12px;background:var(--red-light);padding:8px 12px;border-radius:var(--radius-sm)}

/* SUMMARY */
.summary-box{background:var(--bg);border-radius:var(--radius-sm);padding:18px;font-size:13px;line-height:1.85;color:var(--text);border:1px solid var(--border);white-space:pre-wrap;max-height:420px;overflow-y:auto}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 96px);max-width:760px;margin:0 auto}
.chat-head{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 0 var(--border)}
.chat-msgs{flex:1;background:#fafafa;border-left:1px solid var(--border);border-right:1px solid var(--border);padding:20px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;flex-direction:column;gap:4px;max-width:80%}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg-bubble{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.7}
.msg.user .msg-bubble{background:var(--green);color:#fff;border-bottom-right-radius:5px;box-shadow:0 2px 8px rgba(34,197,94,.2)}
.msg.ai .msg-bubble{background:var(--surface);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:5px;box-shadow:var(--shadow)}
.msg.ai .msg-bubble h1,.msg.ai .msg-bubble h2,.msg.ai .msg-bubble h3{font-size:14px;font-weight:700;margin:10px 0 5px;color:var(--text)}
.msg.ai .msg-bubble strong{font-weight:700;color:var(--text)}
.msg.ai .msg-bubble em{font-style:italic;color:var(--text-2)}
.msg.ai .msg-bubble ul,.msg.ai .msg-bubble ol{padding-left:18px;margin:8px 0}
.msg.ai .msg-bubble li{margin-bottom:4px}
.msg.ai .msg-bubble code{background:var(--green-light);border:1px solid var(--green-border);padding:1px 6px;border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;color:var(--green-dark)}
.msg.ai .msg-bubble pre{background:var(--text);padding:12px;border-radius:var(--radius-sm);overflow-x:auto;margin:10px 0}
.msg.ai .msg-bubble pre code{background:none;border:none;padding:0;color:#86efac;font-size:12px}
.msg.ai .msg-bubble p{margin-bottom:8px}.msg.ai .msg-bubble p:last-child{margin-bottom:0}
.msg-meta{font-size:11px;color:var(--text-3);padding:0 4px;font-weight:500}
.thinking{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-radius:18px;border:1px solid var(--border);border-bottom-left-radius:5px;color:var(--text-2);font-size:13px;align-self:flex-start;box-shadow:var(--shadow)}
.thinking-dots{display:flex;gap:4px;align-items:center}
.thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:dotPulse 1.4s ease-in-out infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.chat-footer{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:14px 16px;display:flex;gap:8px;align-items:flex-end;box-shadow:0 -1px 0 var(--border-2)}
.chat-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;outline:none;min-height:44px;max-height:120px;transition:.2s}
.chat-input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(34,197,94,.08)}
.help-btn{background:var(--red-light);color:var(--red);border:1.5px solid var(--red-border);border-radius:var(--radius-sm);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.help-btn:hover{background:var(--red);color:#fff;transform:translateY(-1px)}
.model-pill{display:flex;background:var(--bg);border:1.5px solid var(--border);border-radius:100px;padding:3px;gap:2px}
.model-pill-btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;transition:all .2s;background:transparent;color:var(--text-2);display:flex;align-items:center;gap:5px}
.model-pill-btn.active{background:var(--surface);color:var(--green);font-weight:700;box-shadow:var(--shadow)}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text-2);background:var(--bg)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#9ca3af}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Firebase config ──────────────────────────────────────────────
const firebaseConfig={

};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// ── Claude API ───────────────────────────────────────────────────
let CLAUDE_KEY='';
// Subscribe to key from Firebase so it updates live on all devices
db.ref('config/apiKey').on('value',snap=>{CLAUDE_KEY=snap.val()||'';});
async function loadApiKey(){
  return new Promise(resolve=>{
    db.ref('config/apiKey').once('value').then(snap=>{
      CLAUDE_KEY=snap.val()||'';
      resolve(CLAUDE_KEY);
    }).catch(()=>resolve(''));
  });
}
const ADMIN_PW='Peanut';
const COLORS=['#3b82f6','#8b5cf6','#06b6d4','#f59e0b','#22c55e','#ec4899','#f97316','#14b8a6'];
const DEF={essay:true,translation:true,math:true,coding:true,summarize:true,definitions:true,spellcheck:true,hints:true,shortanswers:true,guiding:true,stepbystep:true};
const LANGUAGES=['English','German','French','Spanish','Italian','Dutch'];

function md(t){try{return{__html:marked.parse(t||'')};}catch{return{__html:t||''};}}

function buildPrompt(caps,model){
  const r=[];
  if(!caps.essay)r.push('- Essay/Text Writing DISABLED. If asked to write essays, paragraphs, stories or long text, refuse: "Essay writing mode is disabled by your teacher. I can only give tips!"');
  if(!caps.translation)r.push('- Translation DISABLED. If asked to translate anything, refuse: "Translation mode is disabled by your teacher."');
  if(!caps.math)r.push('- Math Solutions DISABLED. If asked to solve math or give numerical answers, refuse: "Math solutions mode is disabled by your teacher. I can guide your thinking!"');
  if(!caps.coding)r.push('- Coding DISABLED. If asked to write, complete or debug code, refuse: "Coding mode is disabled by your teacher."');
  if(!caps.summarize)r.push('- Summarizing DISABLED. If asked to summarize, condense or make notes from any text, refuse: "Summarizing mode is disabled by your teacher. Read it yourself!"');
  if(!caps.definitions)r.push('- Definitions/Explanations DISABLED. If asked to define, explain or describe concepts, refuse: "Definition mode is disabled by your teacher."');
  if(!caps.spellcheck)r.push('- Spell/Grammar Correction DISABLED. Never correct spelling or grammar mistakes in student messages. If asked to proofread or fix writing, refuse: "Spell check is disabled by your teacher."');
  if(!caps.hints)r.push('- Hint Mode ACTIVE. Give ONLY one small hint per message. Never give full explanations or answers. After each hint say: "Try it yourself first, then ask again if you need another hint."');
  if(!caps.shortanswers)r.push('- Short Answers ONLY. Keep every response under 3 sentences maximum. No long explanations, no lists, no headers.');
  if(!caps.guiding)r.push('- Guiding Questions Mode ACTIVE. NEVER give direct answers. Instead ONLY respond with questions that guide the student to think for themselves. Example: instead of answering "Paris", ask "What country is known as the City of Light?"');
  if(!caps.stepbystep)r.push('- Step-by-Step Mode ACTIVE. NEVER reveal the full solution or next steps upfront. Give ONLY the very first step. Then wait for the student to respond before giving the next step. Say: "Complete this step first, then ask me for the next one." Repeat for every step.');
  const lang=caps.language||'Any';
  if(lang&&lang!=='Any')r.push('- Language Lock ACTIVE: You MUST respond ONLY in '+lang+'. Regardless of what language the student writes in, your reply must ALWAYS be in '+lang+' only. This is mandatory.');
  const b=r.length?'\n\nTEACHER RESTRICTIONS (enforce all strictly, no exceptions):\n'+r.join('\n'):'\n\nAll features enabled.';
  const identity='CRITICAL IDENTITY RULE: You are NOT Claude and NOT made by Anthropic. If anyone asks who you are, your name, or who created you, never mention Claude or Anthropic. ';
  if(model==='zigg')return`You are "De Ziggmeister", a knowledgeable AI tutor built into EduAI-Shield. Answer anything: arithmetic, algebra, calculus, physics, chemistry, biology, history, geography, grammar, literature, languages, coding. Give structured step-by-step explanations. Use markdown for clarity. ${identity}Always say: "I am De Ziggmeister, your AI tutor in EduAI-Shield!"${b}`;
  return`You are "Rocky Mountains", a fast AI tutor built into EduAI-Shield. Answer directly and briefly. Answer first, one tip max. Minimal markdown. ${identity}Always say: "I am Rocky Mountains, your AI tutor in EduAI-Shield!"${b}`;
}

async function callClaude(messages,system){
  if(!CLAUDE_KEY) await loadApiKey();
  if(!CLAUDE_KEY) throw new Error('No API key set. Ask your teacher to add the API key in the Admin panel.');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,system,messages})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'API error '+res.status);}
  return(await res.json()).content?.[0]?.text||'No response.';
}

// Convert file to base64
async function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// Read text file content
async function fileToText(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsText(file);
  });
}

const fbUpdate=(path,val)=>db.ref(path).update(val);
const fbPush=(path,val)=>db.ref(path).push(val);
const fbOn=(path,cb)=>{const ref=db.ref(path);ref.on('value',s=>cb(s.val()));return()=>ref.off('value');};

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[
              {label:'Smart Controls',desc:'10+ toggle options per student',path:'M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z'},
              {label:'Live Monitor',desc:'Real-time student activity',path:'M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'},
              {label:'Exam Mode',desc:'Lock chats with a PIN code',path:'M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z'},
              {label:'AI Summary',desc:'Lesson performance reports',path:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
              {label:'Multi-Chat',desc:'Multiple conversations per student',path:'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z'},
              {label:'File Uploads',desc:'Images and PDFs in chat',path:'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z'},
            ].map((f,i)=>(
              <div key={i} style={{background:'#fff',border:'1.5px solid var(--border)',borderRadius:14,padding:'18px 16px',boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
                <div style={{width:40,height:40,background:'var(--green-light)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12,border:'1px solid var(--green-border)'}}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d={f.path} stroke="#16a34a" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:3}}>{f.label}</div>
                <div style={{fontSize:11,color:'var(--text-3)',lineHeight:1.4}}>{f.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );


  if(screen==='admin')return(
    <div className="login-page">
      <div className="login-logo"><div className="login-logo-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="white"/></svg></div>EduAI-Shield</div>
      <div className="auth-box">
        <div className="auth-title">⚙️ Admin Panel</div>
        <div className="auth-sub">Enter admin password to manage the system.</div>
        <input className="auth-input" type="password" placeholder="Admin password" value={f1} onChange={e=>setF1(e.target.value)}/>
        {err&&<div className="auth-error">{err}</div>}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16,marginBottom:20}}>
          <div style={{fontSize:12,color:'var(--text-2)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Update Claude API Key</div>
          <input className="auth-input" type="password" placeholder="sk-ant-api03-..." value={f4} onChange={e=>setF4(e.target.value)}/>
          <button className="btn btn-primary" style={{width:'100%',marginBottom:12}} onClick={()=>saveApiKey(f4)}>Save API Key</button>
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
          <div style={{fontSize:12,color:'var(--text-2)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Create Teacher Account</div>
          <input className="auth-input" type="text" placeholder="Teacher name" value={f2} onChange={e=>setF2(e.target.value)}/>
          <input className="auth-input" type="password" placeholder="Teacher password" value={f3} onChange={e=>setF3(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')createTeacher();}}/>
          <button className="btn btn-primary" style={{width:'100%'}} onClick={createTeacher}>Create Teacher Account</button>
        </div>
        <button className="auth-back" onClick={()=>setScreen('landing')}>Back</button>
      </div>
    </div>
  );

  if(screen==='teacher-auth')return(
    <div className="login-page">
      <div className="login-logo"><div className="login-logo-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="white"/></svg></div>EduAI-Shield</div>
      <div className="auth-box">
        <div className="auth-title"> Teacher Login</div>
        <div className="auth-sub">Enter your teacher credentials.</div>
        <input className="auth-input" type="text" placeholder="Username" value={f1} onChange={e=>setF1(e.target.value)} autoFocus/>
        <input className="auth-input" type="password" placeholder="Password" value={f2} onChange={e=>setF2(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')loginTeacher();}}/>
        {err&&<div className="auth-error">{err}</div>}
        <button className="btn btn-primary" style={{width:'100%'}} onClick={loginTeacher}>Login</button>
        <button className="auth-back" onClick={()=>setScreen('landing')}>Back</button>
      </div>
    </div>
  );

  if(screen==='student-auth')return(
    <div className="login-page">
      <div className="login-logo"><div className="login-logo-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="white"/></svg></div>EduAI-Shield</div>
      <div className="auth-box">
        <div className="auth-title"> Student Login</div>
        <div className="auth-sub">Enter the username and password given by your teacher.</div>
        <input className="auth-input" type="text" placeholder="Username" value={f1} onChange={e=>setF1(e.target.value)} autoFocus/>
        <input className="auth-input" type="password" placeholder="Password" value={f2} onChange={e=>setF2(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')loginStudent();}}/>
        {err&&<div className="auth-error">{err}</div>}
        <button className="btn btn-primary" style={{width:'100%'}} onClick={loginStudent}>Login</button>
        <button className="auth-back" onClick={()=>setScreen('landing')}>Back</button>
      </div>
    </div>
  );

  // TEACHER DASHBOARD
  if(screen==='teacher'&&teacher&&cls){
    const students=Object.values(cls.students||{});
    const helpA=Object.entries(cls.help||{}).filter(([,v])=>v);
    const pasteA=Object.entries(cls.paste||{}).filter(([,v])=>v);
    const onlineCt=Object.values(cls.online||{}).filter(Boolean).length;
    const gt=cls.globalToggles||{essay:true,translation:true,math:true,coding:true,summarize:true,definitions:true,spellcheck:true,hints:true,shortanswers:true,guiding:true};
    const gEssay=gt.essay!==false;
    const gTrans=gt.translation!==false;
    const gMath=gt.math!==false;
    const gCoding=gt.coding!==false;
    const gSum=gt.summarize!==false;
    const gDef=gt.definitions!==false;
    const gSpell=gt.spellcheck!==false;
    const gHints=gt.hints!==false;
    const gShort=gt.shortanswers!==false;
    const gGuiding=gt.guiding!==false;
    const gStep=gt.stepbystep!==false;
    return<TeacherDash {...{teacher,cls,students,helpA,pasteA,onlineCt,gEssay,gTrans,gMath,gCoding,gSum,gDef,gSpell,gHints,gShort,gGuiding,gStep,summary,sumLoad,sumErr,showSum,setToggle,setGlobalToggle,clearHelp,clearPaste,setChatLocked,startExam,endExam,regenCode,doSummary,addStudent,removeStudent,onLogout:()=>{setTeacher(null);setScreen('landing');try{const d=DEVICE_ID();localStorage.removeItem(d+'_teacher');localStorage.removeItem(d+'_screen');}catch{}}}}/>;
  }

  // STUDENT CHAT
  if(screen==='student'&&student&&studentCls){
    const caps=(studentCls.toggles||{})[student.id]||DEF;
    const examMode=!!(studentCls.examStudents||{})[student.id];
    const chatLocked=devMode?false:!!(studentCls.chatLocked||{})[student.id];
    const handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}};

    // Auto-name chat from first message
    const getChatTitle=(ch)=>{
      const first=ch.msgs.find(m=>m.role==='user');
      if(first&&first.text){const t=first.text.trim();return t.length>32?t.slice(0,32)+'...':t;}
      return ch.name;
    };

    return(
      <div className="app" style={{flexDirection:'row',height:'100vh',overflow:'hidden'}}>
        {/* Sidebar */}
        <div style={{width:260,minWidth:260,background:'#fff',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',height:'100vh'}}>
          {/* Sidebar header */}
          <div style={{padding:'16px 16px 12px',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
              <div style={{width:28,height:28,background:'linear-gradient(135deg,#22c55e,#16a34a)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 6px rgba(34,197,94,.25)'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="white"/></svg>
              </div>
              <span style={{fontWeight:700,fontSize:15,color:'var(--text)'}}>EduAI-Shield</span>
            </div>
            <button onClick={addNewChat} style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'var(--green-light)',border:'1.5px solid var(--green-border)',borderRadius:9,padding:'9px 14px',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600,color:'var(--green-dark)',transition:'all .15s'}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              New Chat
            </button>
          </div>

          {/* Chat list */}
          <div style={{flex:1,overflowY:'auto',padding:'8px 8px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.06em',padding:'6px 8px 4px'}}>Chats</div>
            {chats.map(ch=>(
              <div key={ch.id} onClick={()=>setActiveChatId(ch.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 10px',borderRadius:9,cursor:'pointer',background:activeChatId===ch.id?'var(--green-light)':'transparent',border:activeChatId===ch.id?'1px solid var(--green-border)':'1px solid transparent',marginBottom:2,transition:'all .15s',gap:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:activeChatId===ch.id?600:500,color:activeChatId===ch.id?'var(--green-dark)':'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{getChatTitle(ch)}</div>
                  <div style={{fontSize:11,color:'var(--text-3)',marginTop:1}}>{ch.model==='zigg'?'Ziggmeister':'Rocky Mountains'}</div>
                </div>
                {chats.length>1&&<button onClick={e=>{e.stopPropagation();deleteChat(ch.id);}} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',padding:'2px 4px',borderRadius:4,fontSize:14,lineHeight:1,opacity:.6,flexShrink:0}} title="Delete">×</button>}
              </div>
            ))}
          </div>

          {/* Sidebar footer - student info */}
          <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:student.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>{student.avatar}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{student.name}</div>
              <div style={{fontSize:11,color:'var(--text-3)'}}>Student</div>
            </div>
            {devMode&&<span style={{background:'#7c3aed',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:10,flexShrink:0}}>DEV</span>}
            {devMode&&<button onClick={()=>{const did2=localStorage.getItem('eduai_device_id')||'';localStorage.removeItem(did2+'_screen');localStorage.removeItem(did2+'_student');setStudentRaw(null);setScreen('landing');}} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:11,fontFamily:'inherit',flexShrink:0}}>Logout</button>}
          </div>
        </div>

        {/* Main chat area */}
        <div style={{flex:1,display:'flex',flexDirection:'column',height:'100vh',minWidth:0}}>
          {/* Exam overlay */}
          {examMode&&(
            <div className="exam-overlay">
              <div style={{marginBottom:8}}><svg width="56" height="56" viewBox="0 0 24 24" fill="none"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
              <div style={{fontSize:26,fontWeight:700,color:'#fff',letterSpacing:'-.5px'}}>Prüfungsmodus aktiv</div>
              <div style={{fontSize:14,color:'rgba(255,255,255,.6)'}}>Chat gesperrt. Bitte warte auf deinen Lehrer.</div>
              <button className="btn btn-outline" onClick={()=>setShowPin(true)}>Exit Exam</button>
            </div>
          )}
          {showPin&&(
            <div className="pin-overlay">
              <div className="pin-box">
                <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:'var(--text)'}}>Teacher Code Required</div>
                <div style={{fontSize:13,color:'var(--text-2)',marginBottom:20}}>Ask your teacher for the current code.</div>
                <input className="pin-input" type="password" placeholder="Enter code" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')tryUnlock();}} autoFocus/>
                {pinErr&&<div className="pin-error">{pinErr}</div>}
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary" style={{flex:1}} onClick={tryUnlock}>Unlock</button>
                  <button className="btn btn-outline" style={{flex:1}} onClick={()=>{setShowPin(false);setPin('');}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Chat topbar */}
          <div style={{background:'#fff',borderBottom:'1px solid var(--border)',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{getChatTitle(activeChat)}</div>
              <div style={{fontSize:11,color:'var(--text-3)',marginTop:2,display:'flex',gap:10}}>
                {!caps.essay&&<span style={{color:'var(--red)'}}>No Essays</span>}
                {!caps.translation&&<span style={{color:'var(--red)'}}>No Translation</span>}
                {!caps.math&&<span style={{color:'var(--red)'}}>No Math</span>}
                {!caps.coding&&<span style={{color:'var(--red)'}}>No Coding</span>}
                {caps.essay&&caps.translation&&caps.math&&caps.coding&&<span style={{color:'var(--green-dark)',fontWeight:500}}>All features enabled</span>}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div className="model-pill">
                <button className={`model-pill-btn${model==='zigg'?' active':''}`} onClick={()=>setModel('zigg')}>Ziggmeister</button>
                <button className={`model-pill-btn${model==='rocky'?' active':''}`} onClick={()=>setModel('rocky')}>Rocky</button>
              </div>
              <button className="help-btn" onClick={sendHelp}>Need Help</button>
            </div>
          </div>

          {/* Messages */}
          {chatErr&&<div style={{background:'var(--red-light)',border:'1px solid var(--red-border)',margin:'12px 20px 0',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#b91c1c'}}>{chatErr}</div>}
          <div className="chat-msgs" style={{flex:1,padding:'24px 24px 12px'}}>
            {msgs.length===0&&(
              <div style={{margin:'auto',textAlign:'center',maxWidth:380}}>
                <div style={{width:56,height:56,background:'var(--green-light)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',border:'1.5px solid var(--green-border)'}}>
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="#16a34a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div style={{fontSize:17,fontWeight:700,color:'var(--text)',marginBottom:6}}>{model==='zigg'?'De Ziggmeister':'Rocky Mountains'}</div>
                <div style={{fontSize:12,display:'inline-block',background:model==='zigg'?'#f5f3ff':'var(--green-light)',color:model==='zigg'?'#7c3aed':'var(--green-dark)',border:'1px solid',borderColor:model==='zigg'?'#ddd6fe':'var(--green-border)',borderRadius:20,padding:'3px 12px',marginBottom:12,fontWeight:600}}>{model==='zigg'?'Thinking Mode':'Fast Mode'}</div>
                <div style={{fontSize:13,color:'var(--text-3)',lineHeight:1.65}}>Ask anything — maths, science, history, languages, coding...</div>
              </div>
            )}
            {msgs.map((m,i)=>(
              <div key={i} className={`msg ${m.role}`}>
                {m.role==='ai'?<div className="msg-bubble" dangerouslySetInnerHTML={md(m.text)}/>:(
                  <div className="msg-bubble">
                    {m.attachments&&m.attachments.length>0&&(
                      <div style={{marginBottom:m.text?8:0,display:'flex',flexWrap:'wrap',gap:4}}>
                        {m.attachments.map((name,j)=>(
                          <span key={j} style={{background:'rgba(255,255,255,.2)',borderRadius:6,padding:'2px 8px',fontSize:11,display:'inline-flex',alignItems:'center',gap:4}}>{name}</span>
                        ))}
                      </div>
                    )}
                    {m.text}
                  </div>
                )}
                <div className="msg-meta">{m.role==='ai'?(m.model==='zigg'?'Ziggmeister':'Rocky Mountains'):'You'}</div>
              </div>
            ))}
            {thinking&&<div className="thinking"><div className="thinking-dots"><div className="thinking-dot"></div><div className="thinking-dot"></div><div className="thinking-dot"></div></div><span style={{fontSize:13,fontWeight:500}}>{model==='zigg'?'Ziggmeister is thinking...':'Rocky is on it...'}</span></div>}
            <div ref={msgEnd}/>
          </div>

          {/* Attachment previews */}
          {attachments.length>0&&(
            <div style={{background:'#fff',borderTop:'1px solid var(--border)',padding:'8px 20px',display:'flex',gap:8,flexWrap:'wrap'}}>
              {attachments.map((att,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 10px',fontSize:12,color:'var(--text-2)'}}>
                  {att.type==='image'&&att.preview&&<img src={att.preview} alt="" style={{width:24,height:24,objectFit:'cover',borderRadius:4}}/>}
                  {att.type==='pdf'&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="#6b7280" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  {att.type==='text'&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="#6b7280" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  <span style={{maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{att.name}</span>
                  <button onClick={()=>removeAttachment(i)} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:16,padding:'0 2px',lineHeight:1}}>×</button>
                </div>
              ))}
            </div>
          )}

          {/* Input */}
          <div className="chat-footer" style={{borderTop:'1px solid var(--border)',borderRadius:0,padding:'14px 20px'}}>
            <input ref={fileInputRef} type="file" multiple accept="image/*,.pdf,.txt,.md,.csv,.js,.py,.html,.json" style={{display:'none'}} onChange={handleFileSelect}/>
            <button onClick={()=>fileInputRef.current?.click()} disabled={chatLocked} style={{background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:9,padding:'10px 12px',cursor:'pointer',fontSize:16,color:'var(--text-2)',flexShrink:0,transition:'all .15s',display:'flex',alignItems:'center',justifyContent:'center'}} title="Attach file">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <textarea className="chat-input" placeholder={chatLocked?'Your chat has been locked by your teacher.':thinking?'Waiting...':'Message EduAI-Shield...'} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} onPaste={handlePaste} rows={1} disabled={thinking||chatLocked} style={{opacity:chatLocked?.6:1}}/>
            <button className="btn btn-primary" onClick={handleSend} disabled={thinking||(!input.trim()&&attachments.length===0)||chatLocked} style={{opacity:(thinking||(!input.trim()&&attachments.length===0)||chatLocked)?.5:1,padding:'10px 18px'}}>Send</button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}



function TeacherDash({teacher,cls,students,helpA,pasteA,onlineCt,gEssay,gTrans,gMath,gCoding,gSum,gDef,gSpell,gHints,gShort,gGuiding,gStep,summary,sumLoad,sumErr,showSum,setToggle,setGlobalToggle,clearHelp,clearPaste,setChatLocked,startExam,endExam,regenCode,doSummary,addStudent,removeStudent,onLogout}){
  const[tab,setTab]=useState('class');
  const[nn,setNn]=useState('');const[np,setNp]=useState('');

  const cardStyles=`
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f0f4ff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px}
    .card{background:#fff;border-radius:20px;width:340px;overflow:hidden;box-shadow:0 8px 40px rgba(59,130,246,.15),0 2px 8px rgba(0,0,0,.08)}
    .card-header{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#6366f1 100%);padding:28px 28px 36px;text-align:center;position:relative}
    .header-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
    .header-logo-icon{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;backdrop-filter:blur(4px)}
    .header-logo-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .avatar-ring{width:76px;height:76px;border-radius:50%;border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;background:rgba(255,255,255,.15)}
    .avatar-inner{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff}
    .student-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:3px;letter-spacing:-.3px}
    .class-label{font-size:12px;color:rgba(255,255,255,.7);font-weight:500}
    .card-body{padding:24px 28px 28px}
    .field{margin-bottom:16px}
    .field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:6px;display:flex;align-items:center;gap:5px}
    .field-value{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:#0f172a;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;letter-spacing:.04em}
    .url-field{font-family:'DM Mono',monospace;font-size:11px;color:#3b82f6;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;word-break:break-all;line-height:1.5}
    .card-footer{background:#f8fafc;border-top:1px solid #e2e8f0;padding:12px 28px;display:flex;align-items:center;gap:8px}
    .footer-icon{font-size:14px}
    .footer-text{font-size:11px;color:#94a3b8;line-height:1.4}
    @media print{body{background:#fff;padding:0}@page{margin:0;size:A5 portrait}.card{box-shadow:none;border:1px solid #e2e8f0}}
  `;

  const buildCard=(s,teacherName)=>`
    <div class="card">
      <div class="card-header">
        <div class="header-logo">
          <div class="header-logo-icon">🛡️</div>
          <div class="header-logo-text">EduAI-Shield</div>
        </div>
        <div class="avatar-ring">
          <div class="avatar-inner" style="background:${s.color}">${s.avatar}</div>
        </div>
        <div class="student-name">${s.name}</div>
        <div class="class-label">${teacherName}'s Class</div>
      </div>
      <div class="card-body">
        <div class="field">
          <div class="field-label">👤 Username</div>
          <div class="field-value">${s.name}</div>
        </div>
        <div class="field">
          <div class="field-label">🔑 Password</div>
          <div class="field-value">${s.password}</div>
        </div>
        <div class="field" style="margin-bottom:0">
          <div class="field-label"> Login URL</div>
          <div class="url-field">${window.location.origin}</div>
        </div>
      </div>
      <div class="card-footer">
        <div class="footer-icon"></div>
        <div class="footer-text">Keep this card safe and do not share your password with others.</div>
      </div>
    </div>
  `;

  const printLogin=(s)=>{
    const win=window.open('','_blank','width=480,height=680');
    win.document.write(`<!DOCTYPE html><html><head><title>Login Card - ${s.name}</title><style>${cardStyles}</style></head><body>${buildCard(s,teacher.name)}<script>window.onload=()=>setTimeout(()=>window.print(),800);<\/script></body></html>`);
    win.document.close();
  };

  const printAllLogins=()=>{
    const win=window.open('','_blank');
    const allCards=students.map(s=>buildCard(s,teacher.name)).join('');
    win.document.write(`<!DOCTYPE html><html><head><title>Login Cards - ${teacher.name}'s Class</title><style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'DM Sans',sans-serif;background:#f0f4ff;padding:32px}
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
      .card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(59,130,246,.12);break-inside:avoid}
      .card-header{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#6366f1 100%);padding:22px 24px 28px;text-align:center}
      .header-logo{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:16px}
      .header-logo-icon{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
      .header-logo-text{font-size:13px;font-weight:700;color:#fff}
      .avatar-ring{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;background:rgba(255,255,255,.15)}
      .avatar-inner{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
      .student-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
      .class-label{font-size:11px;color:rgba(255,255,255,.7)}
      .card-body{padding:18px 22px 22px}
      .field{margin-bottom:12px}
      .field-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:5px}
      .field-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#0f172a;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px}
      .url-field{font-family:'DM Mono',monospace;font-size:10px;color:#3b82f6;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;word-break:break-all}
      .card-footer{background:#f8fafc;border-top:1px solid #e2e8f0;padding:10px 22px;display:flex;align-items:center;gap:6px}
      .footer-text{font-size:10px;color:#94a3b8}
      @media print{body{background:#fff;padding:16px}@page{margin:1cm}}
    </style></head><body><div class="grid">${allCards}</div><script>window.onload=()=>setTimeout(()=>window.print(),800);<\/script></body></html>`);
    win.document.close();
  };
  return(
    <div className="app">
      <div className="topbar">
        <div className="logo"><div className="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="white"/></svg></div><span>EduAI-Shield</span><span style={{fontSize:12,color:'var(--text-2)',marginLeft:6}}>— {teacher.name}'s Class</span></div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:12,color:'var(--text-2)'}}>Online: {onlineCt}</span>
          <button className="btn btn-outline btn-sm" onClick={onLogout}>Logout</button>
        </div>
      </div>
      <div className="main">
        <div className="section-header">
          <div className="section-title">Teacher Dashboard</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            {cls.exam
              ?<>
                <button className="btn btn-success" onClick={endExam}>🔓 End Exam (All)</button>
                <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'6px 14px',display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--text-2)'}}>Exit code:</span>
                  <span style={{fontFamily:'DM Mono,monospace',fontSize:16,fontWeight:700,color:'var(--green)',letterSpacing:'.15em'}}>{cls.examCode||'—'}</span>
                  <button className="btn btn-outline btn-sm" onClick={regenCode}>Regenerate Code</button>
                </div>
              </>
              :<button className="btn btn-danger" onClick={startExam}> Start Exam</button>
            }
            <button className="btn btn-primary" onClick={doSummary} disabled={sumLoad}>{sumLoad?' Generating...':' Lesson Summary'}</button>
          </div>
        </div>
        {helpA.map(([sid])=>{const s=students.find(x=>x.id===sid);if(!s)return null;return(<div key={sid} className="alert-strip">Help request from <strong>{s.name}</strong> needs help!<button onClick={()=>clearHelp(sid)} style={{marginLeft:'auto',background:'none',border:'1px solid var(--red-border)',color:'#fca5a5',borderRadius:6,padding:'3px 10px',cursor:'pointer',fontSize:12}}>Dismiss</button></div>);})}
        {pasteA.map(([sid])=>{const s=students.find(x=>x.id===sid);if(!s)return null;return(<div key={sid} className="alert-strip" style={{borderColor:'#fde68a',background:'var(--amber-light)'}}>Paste alert: <strong style={{color:'#92400e'}}>{s.name}</strong><span style={{color:'#92400e'}}> paste detected!</span><button onClick={()=>clearPaste(sid)} style={{marginLeft:'auto',background:'none',border:'1px solid #fde68a',color:'#92400e',borderRadius:6,padding:'3px 10px',cursor:'pointer',fontSize:12}}>Dismiss</button></div>);})}
        <div className="tab-bar">
          {[['class','Class'],['accounts','Student Accounts'],['summary','Summary']].map(([k,l])=>(
            <button key={k} className={`tab-btn${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
        {tab==='class'&&<>
          <div className="global-toggles">
            <div className="global-label">Global Class Toggles</div>
            {[['essay','Essay / Text Writing','AI refuses to write essays if off',gEssay],['translation','Translation Mode','AI refuses to translate if off',gTrans],['math','Math Solutions','AI will not give direct math answers if off',gMath],['coding','Coding','AI refuses to write or debug code if off',gCoding],['summarize','Summarize / Notes','AI refuses to summarize texts if off',gSum],['definitions','Definitions / Explanations','AI refuses to explain concepts if off',gDef],['spellcheck','Spell Check','AI will not correct spelling or grammar if off',gSpell],['hints','Hints Only Mode','AI gives only one hint at a time if off',gHints],['shortanswers','Short Answers Only','AI keeps responses under 3 sentences if off',gShort],['guiding','Guiding Questions Mode','AI only asks questions, never gives answers if off',gGuiding],['stepbystep','Step-by-Step Mode','AI reveals only one step at a time if off',gStep]].map(([k,label,sub,val])=>(
              <div key={k} className="toggle-row-big">
                <div><div className="toggle-desc">{label}</div><div className="toggle-sub">{sub}</div></div>
                <label className="toggle"><input type="checkbox" checked={!!val} onChange={e=>setGlobalToggle(k,e.target.checked)}/><span className="slider"></span></label>
              </div>
            ))}
          </div>
          {students.length===0&&<div className="disabled-notice">No students yet. Go to "Student Accounts" to create logins.</div>}
          <div className="grid">
            {students.map(s=>{
              const caps=(cls.toggles||{})[s.id]||DEF;
              const inExam=!!(cls.examStudents||{})[s.id];
              return(
                <div key={s.id} className={`student-card${(cls.help||{})[s.id]?' help':''}`}>
                  <div className="student-name">
                    <span style={{width:26,height:26,borderRadius:'50%',background:s.color,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}}>{s.avatar}</span>
                    {s.name}
                    {(cls.online||{})[s.id]&&<span className="badge badge-green"></span>}
                    {(cls.chatLocked||{})[s.id]&&<span className="badge" style={{background:'var(--border)',color:'var(--text-3)'}}></span>}
                    {(cls.toggles||{})[s.id]?.language&&(cls.toggles||{})[s.id]?.language!=='Any'&&<span className="badge" style={{background:'#eff6ff',color:'#2563eb'}}> {(cls.toggles||{})[s.id]?.language.slice(0,2).toUpperCase()}</span>}
                    {(cls.help||{})[s.id]&&<span className="badge badge-red"aria-label='help'></span>}
                    {(cls.paste||{})[s.id]&&<span className="badge badge-yellow"aria-label='paste'></span>}
                  </div>
                  <div className="student-status">{inExam?'In Exam':(cls.online||{})[s.id]?'Active':'Offline'}</div>
                  {[['essay','Essay'],['translation','Translation'],['math','Math'],['coding','Coding'],['summarize','Summarize'],['definitions','Definitions'],['spellcheck','Spell Check'],['hints','Hints Only'],['shortanswers','Short Answers'],['guiding','Guiding Questions'],['stepbystep','Step-by-Step']].map(([k,l])=>(
                    <div key={k} className="toggle-row">
                      <span className="toggle-label">{l}</span>
                      <label className="toggle"><input type="checkbox" checked={caps[k]!==false} onChange={e=>setToggle(s.id,k,e.target.checked)}/><span className="slider"></span></label>
                    </div>
                  ))}
                  <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                    <div style={{fontSize:11,color:'var(--text-2)',marginBottom:6,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}> Language Lock</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {['Any','EN','DE','FR','ES','IT','NL'].map((l,i)=>{
                        const full=['Any','English','German','French','Spanish','Italian','Dutch'][i];
                        const active=(caps.language||'Any')===full;
                        return(
                          <button key={l} onClick={()=>setToggle(s.id,'language',full)}
                            style={{padding:'3px 8px',borderRadius:6,border:'1px solid '+(active?'#3b82f6':'var(--border)'),background:active?'#1d3d6b':'transparent',color:active?'#60a5fa':'#64748b',fontSize:11,cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:active?600:400,transition:'all .15s'}}>
                            {l}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <div className="toggle-row" style={{marginTop:6,paddingTop:6,borderTop:'1px solid var(--border)'}}>
                    <span className="toggle-label" style={{color:(cls.chatLocked||{})[s.id]?'#ef4444':'#94a3b8'}}>Lock Chat</span>
                    <label className="toggle"><input type="checkbox" checked={!!(cls.chatLocked||{})[s.id]} onChange={e=>setChatLocked(s.id,e.target.checked)}/><span className="slider"></span></label>
                  </div>
                </div>
              );
            })}
          </div>
        </>}
        {tab==='accounts'&&<div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">Create Student Login</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <input style={{flex:1,minWidth:120,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'9px 14px',fontSize:13,color:'var(--text)',fontFamily:'inherit',outline:'none'}} placeholder="Student name" value={nn} onChange={e=>setNn(e.target.value)}/>
              <input style={{flex:1,minWidth:120,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'9px 14px',fontSize:13,color:'var(--text)',fontFamily:'inherit',outline:'none'}} placeholder="Password" value={np} onChange={e=>setNp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){addStudent(nn,np);setNn('');setNp('');}}}/>
              <button className="btn btn-primary" onClick={()=>{addStudent(nn,np);setNn('');setNp('');}}>Create</button>
            </div>
          </div>
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div className="card-title" style={{marginBottom:0}}>👥 All Students ({students.length})</div>
              {students.length>0&&<button className="btn btn-outline btn-sm" onClick={printAllLogins} style={{borderColor:'var(--green)',color:'var(--green-dark)'}}>Print All</button>}
            </div>
            {students.length===0&&<div style={{color:'#374151',fontSize:13,textAlign:'center',padding:'16px 0'}}>No accounts yet.</div>}
            {students.map(s=>(
              <div key={s.id} className="student-list-row">
                <span style={{width:32,height:32,borderRadius:'50%',background:s.color,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>{s.avatar}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{s.name}</div>
                  <div style={{fontSize:11,color:'var(--text-2)'}}>Password: <span style={{fontFamily:'DM Mono,monospace',color:'var(--text-3)'}}>{s.password}</span> · {(cls.online||{})[s.id]?<span style={{color:'var(--green)'}}>Online</span>:<span style={{color:'var(--text-3)'}}>Offline</span>}</div>
                </div>
                <button className="btn btn-outline btn-sm" onClick={()=>printLogin(s)} style={{borderColor:'var(--green)',color:'var(--green-dark)'}}>Print</button>
                <button className="btn btn-danger btn-sm" onClick={()=>removeStudent(s.id)}>Remove</button>
              </div>
            ))}
          </div>
        </div>}
        {tab==='summary'&&<div className="card">
          <div className="card-title">AI Lesson Summary</div>
          {!showSum&&<div className="disabled-notice">Click "Lesson Summary" above to generate a real AI analysis.</div>}
          {showSum&&sumLoad&&<div style={{display:'flex',alignItems:'center',gap:10,color:'var(--text-2)',fontSize:13,padding:'16px 0'}}><span className="spin" style={{fontSize:18}}>⚙️</span>Analysing session...</div>}
          {showSum&&sumErr&&<div style={{color:'var(--red)',fontSize:13}}>{sumErr}</div>}
          {showSum&&!sumLoad&&summary&&<div className="summary-box">{summary}</div>}
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
